name: android

on:
  push:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3
        with:
          # 에뮬레이터 미설치 (APK 빌드만 — setup 단계 flake 회피)
          packages: "platform-tools platforms;android-35 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Shared unit tests (contract + parser)
        run: ./gradlew :shared:test

      - name: Build debug APKs (wear + phone)
        run: ./gradlew :wear:assembleDebug :app:assembleDebug

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: roxlogy-apks
          path: |
            android/wear/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
