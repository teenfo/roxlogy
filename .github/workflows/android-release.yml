name: android-release

# 사이드로드 배포: release APK를 빌드해 Supabase 공개 스토리지에 업로드한다.
# 다운로드 페이지(web/lib/app-links.ts)가 이 공개 URL을 가리킨다.
# 시크릿:
#   SUPABASE_SERVICE_ROLE_KEY  — 서버 전용(클라이언트 노출 금지), 스토리지 업로드용
#   ROXLOGY_KEYSTORE_BASE64    — release keystore(.jks)를 base64 인코딩한 값 (Google 로그인엔 고정 서명 필수)
#   ROXLOGY_KEYSTORE_PASSWORD / ROXLOGY_KEY_ALIAS / ROXLOGY_KEY_PASSWORD — keystore 자격증명
#   ROXLOGY_GOOGLE_WEB_CLIENT_ID — (선택) 웹 클라이언트 ID 오버라이드. 미설정 시 소스 기본값 사용.
# keystore 시크릿이 없으면 debug 서명으로 폴백(설치는 되지만 서명키가 고정되지 않아 Google 로그인은 실패).
# 설정 절차: docs/GOOGLE_SIGNIN_SETUP.md
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;34.0.0"

      - name: Decode release keystore (if configured)
        # 고정 release keystore를 base64 시크릿에서 복원해 ROXLOGY_KEYSTORE_FILE로 노출.
        # 없으면 경고만 남기고 debug 서명으로 폴백(Google 로그인은 고정 서명 필요).
        env:
          KS_B64: ${{ secrets.ROXLOGY_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/roxlogy-release.jks"
            echo "ROXLOGY_KEYSTORE_FILE=$RUNNER_TEMP/roxlogy-release.jks" >> "$GITHUB_ENV"
            echo "release keystore decoded ($(wc -c < "$RUNNER_TEMP/roxlogy-release.jks") bytes)"
          else
            echo "::warning::ROXLOGY_KEYSTORE_BASE64 미설정 — release APK가 debug 서명으로 폴백됩니다(Google 로그인 실패). docs/GOOGLE_SIGNIN_SETUP.md 참고."
          fi

      - name: Write google-services.json (if configured)
        # FCM(푸시) 활성화용. base64 시크릿이 있으면 app/google-services.json 으로 복원 →
        # 조건부 google-services 플러그인이 적용돼 릴리스 APK에 FCM이 포함된다.
        # 미설정 시 스킵(앱은 정상 빌드, 앱 알림은 "준비 중"으로 표시). 파일을 리포에 커밋해도 동작.
        env:
          GS_B64: ${{ secrets.ROXLOGY_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GS_B64" ]; then
            echo "$GS_B64" | base64 -d > app/google-services.json
            echo "google-services.json written ($(wc -c < app/google-services.json) bytes) — FCM 활성화"
          elif [ -f app/google-services.json ]; then
            echo "google-services.json 커밋본 사용 — FCM 활성화"
          else
            echo "::warning::google-services.json 미설정 — 앱 푸시 없이 빌드됩니다. docs/FCM_SETUP.md 참고."
          fi

      - name: Build release APKs
        # 고정 keystore가 있으면 그 키로 서명(:app·:wear 모두). ROXLOGY_KEYSTORE_FILE은 위 스텝이 설정.
        # ROXLOGY_GOOGLE_WEB_CLIENT_ID는 미설정 시 소스 기본값(공개 웹 클라이언트 ID)이 쓰인다.
        env:
          ROXLOGY_GOOGLE_WEB_CLIENT_ID: ${{ secrets.ROXLOGY_GOOGLE_WEB_CLIENT_ID }}
          ROXLOGY_KEYSTORE_PASSWORD: ${{ secrets.ROXLOGY_KEYSTORE_PASSWORD }}
          ROXLOGY_KEY_ALIAS: ${{ secrets.ROXLOGY_KEY_ALIAS }}
          ROXLOGY_KEY_PASSWORD: ${{ secrets.ROXLOGY_KEY_PASSWORD }}
        run: ./gradlew :wear:assembleRelease :app:assembleRelease

      - name: Print phone APK signing SHA-1 (Google 콘솔에 등록할 값)
        # 실제로 APK를 서명한 인증서의 SHA-1/SHA-256을 로그에 출력 → Google Cloud Android 클라이언트에 등록.
        # apksigner 사용(v2/v3 서명 대응). keytool -printcert -jarfile은 v1 전용이라 minSdk>=24 앱에선 안 보임.
        run: |
          APKSIGNER="$(ls "$ANDROID_HOME"/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)"
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --print-certs app/build/outputs/apk/release/app-release.apk \
              | grep -Ei "SHA-1|SHA-256" || echo "서명 인증서 정보를 읽지 못했습니다."
          else
            echo "::warning::apksigner를 찾지 못했습니다."
          fi

      - name: Upload APKs to Supabase Storage (public)
        env:
          SR: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BASE: https://vuloxbpfhyqkvgmpmkst.supabase.co/storage/v1/object/app-downloads
        run: |
          if [ -z "$SR" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY not set — skipping public publish; APKs still available as workflow artifacts."
            exit 0
          fi
          upload() {
            local file="$1" name="$2"
            echo "Uploading $name…"
            curl -sSf -X POST \
              -H "Authorization: Bearer $SR" \
              -H "apikey: $SR" \
              -H "x-upsert: true" \
              -H "Content-Type: application/vnd.android.package-archive" \
              --data-binary "@$file" \
              "$BASE/$name" > /dev/null
          }
          upload wear/build/outputs/apk/release/wear-release.apk roxlogy-wear-latest.apk
          upload app/build/outputs/apk/release/app-release.apk roxlogy-phone-latest.apk
          echo "Published to https://vuloxbpfhyqkvgmpmkst.supabase.co/storage/v1/object/public/app-downloads/"

      - name: Upload APKs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roxlogy-release-apks
          path: |
            android/wear/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
